  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html lang=\"ja\"><head>\n<meta charset=\"utf-8\">\n<title>Cortex Search Service の仕組み<\u002Ftitle>\n<meta name=\"viewport\" content=\"width=1280\">\n\n<style>\n  :root {\n    --bg: oklch(0.985 0.003 250);\n    --panel: #ffffff;\n    --ink: oklch(0.22 0.012 250);\n    --ink-2: oklch(0.42 0.010 250);\n    --ink-3: oklch(0.62 0.008 250);\n    --rule: oklch(0.90 0.006 250);\n    --rule-2: oklch(0.82 0.006 250);\n    --accent: oklch(0.52 0.14 255);       /* インクブルー */\n    --accent-soft: oklch(0.94 0.04 255);\n    --mono: ui-monospace, \"SF Mono\", \"JetBrains Mono\", Menlo, Consolas, monospace;\n    --sans: \"Helvetica Neue\", Helvetica, \"Hiragino Sans\", \"Yu Gothic\", system-ui, sans-serif;\n  }\n  * { box-sizing: border-box; }\n  html, body { margin: 0; background: var(--bg); color: var(--ink); font-family: var(--sans); }\n  body {\n    padding: 20px 40px 28px;\n    font-size: 14px;\n    line-height: 1.5;\n    letter-spacing: 0.005em;\n    -webkit-font-smoothing: antialiased;\n  }\n  .wrap { max-width: 1160px; margin: 0 auto; }\n\n  /* ===== Header ===== */\n  header {\n    display: flex;\n    justify-content: space-between;\n    align-items: baseline;\n    border-bottom: 1px solid var(--rule);\n    padding-bottom: 8px;\n    margin-bottom: 10px;\n  }\n  .eyebrow {\n    font-family: var(--mono);\n    font-size: 11px;\n    text-transform: uppercase;\n    letter-spacing: 0.14em;\n    color: var(--ink-3);\n  }\n  h1 {\n    font-size: 20px;\n    font-weight: 500;\n    margin: 2px 0 0;\n    letter-spacing: -0.01em;\n  }\n  h1 .sub {\n    color: var(--ink-2);\n    font-weight: 400;\n  }\n  .meta {\n    font-family: var(--mono);\n    font-size: 11px;\n    color: var(--ink-3);\n    text-align: right;\n    line-height: 1.7;\n  }\n\n  /* ===== Intro ===== */\n  .intro {\n    display: grid;\n    grid-template-columns: 120px 1fr;\n    gap: 20px;\n    margin-bottom: 10px;\n  }\n  .intro h2 {\n    font-size: 13px;\n    font-weight: 500;\n    margin: 0;\n    color: var(--ink-2);\n    letter-spacing: 0.02em;\n  }\n  .intro p {\n    margin: 0;\n    font-size: 12.5px;\n    line-height: 1.55;\n    max-width: 900px;\n    text-wrap: pretty;\n  }\n  .intro p + p { margin-top: 4px; }\n  .intro strong { color: var(--ink); font-weight: 500; background: var(--accent-soft); padding: 1px 4px; border-radius: 2px; }\n\n  /* ===== Diagram ===== */\n  .diagram {\n    background: var(--panel);\n    border: 1px solid var(--rule);\n    border-radius: 4px;\n    padding: 12px 18px 14px;\n    margin-bottom: 14px;\n  }\n  .diagram-head {\n    display: flex;\n    justify-content: space-between;\n    align-items: baseline;\n    margin-bottom: 6px;\n  }\n  .diagram-head h2 {\n    font-size: 15px;\n    font-weight: 500;\n    margin: 0;\n    letter-spacing: 0.01em;\n  }\n  .diagram-head .tag {\n    font-family: var(--mono);\n    font-size: 11px;\n    color: var(--ink-3);\n    letter-spacing: 0.08em;\n  }\n\n  svg.flow { width: 100%; height: 380px; display: block; }\n  svg.flow text { font-family: var(--sans); fill: var(--ink); }\n  svg.flow .mono { font-family: var(--mono); }\n  svg.flow .label-lg { font-size: 15px; font-weight: 500; }\n  svg.flow .label-sm { font-size: 13px; fill: var(--ink-2); }\n  svg.flow .label-xs { font-size: 12px; fill: var(--ink-3); letter-spacing: 0.04em; }\n  svg.flow .col-title { font-family: var(--mono); font-size: 12px; fill: var(--ink-3); letter-spacing: 0.14em; text-transform: uppercase; }\n\n  /* ===== Entity mapping row (fused with diagram) ===== */\n  .entity-map {\n    margin-top: -2px;\n    padding-top: 0;\n  }\n  .entity-map .entity-head { display: none; }\n  .entity-grid {\n    display: grid;\n    grid-template-columns: repeat(4, 1fr);\n    gap: 0;\n    border: none;\n    border-top: 1px solid var(--rule);\n    border-radius: 0;\n    overflow: visible;\n    background: transparent;\n    padding-top: 10px;\n  }\n  .entity-col {\n    padding: 8px 12px 4px;\n    border-right: 1px dashed var(--rule);\n    background: transparent;\n    position: relative;\n    text-align: center;\n  }\n  .entity-col:last-child { border-right: none; }\n  .entity-col::before {\n    content: \"\";\n    position: absolute;\n    top: -8px;\n    left: 50%;\n    width: 1px;\n    height: 6px;\n    background: var(--accent);\n    opacity: 0.55;\n  }\n  .entity-col .step-n {\n    display: block;\n    font-family: var(--mono);\n    font-size: 10px;\n    color: var(--accent);\n    letter-spacing: 0.14em;\n    margin-bottom: 2px;\n    text-transform: uppercase;\n  }\n  .entity-col .role {\n    display: block;\n    font-size: 11.5px;\n    font-weight: 500;\n    color: var(--ink);\n    margin-bottom: 4px;\n    line-height: 1.35;\n    letter-spacing: 0.005em;\n  }\n  .entity-col .arrow {\n    display: block;\n    font-family: var(--mono);\n    font-size: 9.5px;\n    color: var(--ink-3);\n    letter-spacing: 0.14em;\n    margin: 4px 0 3px;\n  }\n  .entity-col .real {\n    font-family: var(--mono);\n    font-size: 11.5px;\n    color: var(--ink);\n    background: oklch(0.96 0.02 255);\n    border: 1px solid oklch(0.88 0.04 255);\n    padding: 5px 8px;\n    border-radius: 2px;\n    line-height: 1.35;\n    word-break: break-word;\n    text-align: center;\n    display: inline-block;\n    min-width: 80%;\n  }\n  .entity-col .real::before { content: none; }\n  .entity-col .real::after { content: none; }\n  .entity-col .real .hint {\n    display: block;\n    font-family: var(--sans);\n    font-size: 11.5px;\n    color: var(--ink-2);\n    margin-top: 4px;\n    line-height: 1.5;\n  }\n\n  /* ===== Step strip (kept for potential reuse) ===== */\n  .steps { display: none; }\n  .step {\n    padding: 22px 22px 24px;\n    border-right: 1px solid var(--rule);\n  }\n  .step:last-child { border-right: none; }\n  .step .n {\n    font-family: var(--mono);\n    font-size: 11px;\n    color: var(--accent);\n    letter-spacing: 0.12em;\n    margin-bottom: 10px;\n  }\n  .step h3 {\n    font-size: 14px;\n    font-weight: 500;\n    margin: 0 n    font-size: 10px;\n    letter-spacing: 0.14em;\n    color: var(--ink-3);\n    margin-bottom: 10px;\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n<div class=\"wrap\">\n\n  <header>\n    <div>\n      <div class=\"eyebrow\">Snowflake / Cortex Search Service<\u002Fdiv>\n      <h1>Cortex Search とは <span class=\"sub\">— ベクトル検索の仕組みを3分で<\u002Fspan><\u002Fh1>\n    <\u002Fdiv>\n    <div class=\"meta\">\n      FOR / Snowflake経験者 × LLM初心者<br>\n      REV / 2026.04\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- Intro -->\n  <section class=\"intro\">\n    <h2>概要<\u002Fh2>\n    <div>\n      <p>\n        Cortex Search Service は、Snowflake のテーブルにある<strong>テキストカラム<\u002Fstrong>を\n        そのまま<strong>意味ベースで検索<\u002Fstrong>できるようにするマネージドサービス。\n      <\u002Fp>\n      <p>\n        裏側では、対象テキストを<strong>ベクトル（数値の配列）に変換<\u002Fstrong>し、\n        それを<strong>検索可能なインデックスに格納<\u002Fstrong>している。\n        検索時はクエリも同じ方法でベクトル化し、インデックス内で「意味が近い」ベクトルを探す。\n      <\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- Diagram -->\n  <section class=\"diagram\">\n    <div class=\"diagram-head\">\n      <h2>登場する要素と関係性<\u002Fh2>\n      <div class=\"tag\">FIG. 01 / DATA FLOW × SNOWFLAKE ENTITY<\u002Fdiv>\n    <\u002Fdiv>\n\n    <svg class=\"flow\" viewBox=\"0 0 1080 440\" preserveAspectRatio=\"xMidYMid meet\" aria-labelledby=\"flow-title\">\n      <title id=\"flow-title\">ソーステーブルからインデックス生成、検索までのデータフロー<\u002Ftitle>\n\n      <defs>\n        <marker id=\"arr\" viewBox=\"0 0 10 10\" refX=\"9\" refY=\"5\" markerWidth=\"8\" markerHeight=\"8\" orient=\"auto-start-reverse\">\n          <path d=\"M0,0 L10,5 L0,10 z\" fill=\"oklch(0.52 0.14 255)\"><\u002Fpath>\n        <\u002Fmarker>\n        <marker id=\"arrInk\" viewBox=\"0 0 10 10\" refX=\"9\" refY=\"5\" markerWidth=\"7\" markerHeight=\"7\" orient=\"auto-start-reverse\">\n          <path d=\"M0,0 L10,5 L0,10 z\" fill=\"oklch(0.42 0.010 250)\"><\u002Fpath>\n        <\u002Fmarker>\n        <pattern id=\"stripes\" width=\"6\" height=\"6\" patternUnits=\"userSpaceOnUse\" patter   <\u002Ftext>\n      <\u002Fg>\n    <\u002Fsvg>\n\n    <!-- Snowflake entity mapping -->\n    <div class=\"entity-map\">\n      <div class=\"entity-head\">FIG. 02 / Snowflakeでの実体<\u002Fdiv>\n      <div class=\"entity-grid\">\n        <div class=\"entity-col\">\n          <div class=\"step-n\">01 / ソース<\u002Fdiv>\n          <div class=\"role\">ソーステーブル<br>＋ テキストカラム<\u002Fdiv>\n          <div class=\"arrow\">SNOWFLAKE 実体 ↓<\u002Fdiv>\n          <div class=\"real\">DATABASE.SCHEMA.TABLE<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"entity-col\">\n          <div class=\"step-n\">02 / ベクトル化<\u002Fdiv>\n          <div class=\"role\">埋め込みモデル<br>（テキスト → ベクトル）<\u002Fdiv>\n          <div class=\"arrow\">SNOWFLAKE 実体 ↓<\u002Fdiv>\n          <div class=\"real\">Cortex 内蔵の埋め込みモデル<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"entity-col\">\n          <div class=\"step-n\">03 / インデックス<\u002Fdiv>\n          <div class=\"role\">検索可能なインデックス<br>（id × ベクトル）<\u002Fdiv>\n          <div class=\"arrow\">SNOWFLAKE 実体 ↓<\u002Fdiv>\n          <div class=\"real\">CORTEX SEARCH SERVICE<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"entity-col\">\n          <div class=\"step-n\">04 / 検索<\u002Fdiv>\n          <div class=\"role\">クエリ<br>＋ クエリベクトル<\u002Fdiv>\n          <div class=\"arrow\">SNOWFLAKE 実体 ↓<\u002Fdiv>\n          <div class=\"real\">SEARCH_PREVIEW() / REST API<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- Steps -->\n  <section class=\"steps\">\n    <div class=\"step\">\n      <div class=\"n\">STEP 01<\u002Fdiv>\n      <h3>ソーステーブルを指定<\u002Fh3>\n      <p>Snowflakeの既存テーブルと、検索対象にしたい<span style=\"font-family:var(--mono)\">テキストカラム<\u002Fspan>を1つ選ぶ。<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"step\">\n      <div class=\"n\">STEP 02<\u002Fdiv>\n      <h3>テキストをベクトル化<\u002Fh3>\n      <p>埋め込みモデルが各行のテキストを数値ベクトルに変換する。Cortex が自動で実行。<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"step\">\n      <div class=\"n\">STEP 03<\u002Fdiv>\n      <h3>インデックスに格納<\u002Fh3>\n      <p>変換後のベクトルを<strong style=\"color:var(--accent);font-weight:500\">検索可能なインデックス<\u002Fstrong>に保存。ソース更新にも追従。<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"step\">\n      <div class=\"n\">STEP 04<\u002Fdiv>\n      <h3>クエリも同じ方法で<\u002Fh3>\n      <p>検索クエリも同じモデルでベクトル化し、インデックス内で近いベクトルを返す。<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- Glossary -->\n  <section class=\"glossary\">\n    <h2>用語対応表<\u002Fh2>\n    <dl>\n      <dt>ソーステーブル<\u002Fdt>\n      <dd>検索したい元データが入った Snowflake のテーブル。普段SQLで触っているものそのまま。<\u002Fdd>\n\n      <dt>テキストカラム（検索対象）<\u002Fdt>\n      <dd>ソーステーブルの中で「この中身を検索したい」と指定する1つのカラム。FAQの本文、商品説明、ドキュメント本文など。<\u002Fdd>\n\n      <dt>ベクトル（埋め込み）<\u002Fdt>\n      <dd>テキストの意味を数百〜数千次元の数値配列で表したもの。意味が近いテキストほどベクトル同士の距離も近くなる。<\u002Fdd>\n\n      <dt>インデックス<\u002Fdt>\n      <dd>ベクトルを高速に類似検索できるよう整理したデータ構造。Cortex Search がサービスとして管理する。<\u002Fdd>\n\n      <dt>クエリ（検索文字列）<\u002Fdt>\n      <dd>ユーザーが投げる自然言語の問い合わせ。同じ埋め込みモデルでベクトル化され、インデックスと照合される。<\u002Fdd>\n    <\u002Fdl>\n  <\u002Fsection>\n\n  <!-- Original prompt (for reproducibility) -->\n  <section class=\"prompt-archive\">\n    <h2>作成指示（原文）<\u002Fh2>\n    <p class=\"prompt-note\">本資料を再生成・更新する際の元プロンプト。<\u002Fp>\n    <pre class=\"prompt-body\" data-rev=\"REV 01 / 2026.04.21\">SnowflakeCortexSerachServiceの説明\n\nLLM初心者かつSnowflake経験者を想定し。簡潔に記載して\n\n以下の要素を反映して\n「ベクトルを検索可能なインデックスに格納」の要素を含むこと\n「ソーステーブル\nソーステーブルのテキストカラム（検索対象）\nソースのテキストカラムの変換後のベクトル\n検索クエリと変換後のベクトル」\nこれらの関係性がわかること。<\u002Fpre>\n\n    <pre class=\"prompt-body\" data-rev=\"REV 02 / 2026.04.22\">登場する要素と関係性 セクションで、ソース〜検索までの要素が「Snowflakeでの実体は何か」という要素を追加して。また\nこの指示も末尾に追加して。以下同じ。<\u002Fpre>\n\n    <pre class=\"prompt-body\" data-rev=\"REV 03 / 2026.04.22\">FIG01 と FIG02 の要素を、一画面でスクロール無しで見れるよう、統合して。スペースを稼ぐために、FIG2の実態の解説文が長いので「実体の説明」のみに絞って。<\u002Fpre>\n\n    <pre class=\"prompt-body\" data-rev=\"REV 04 / 2026.04.22\">FIG01と02が別セクションに見えるので、１つのスライドとして統合して欲しい。<\u002Fpre>\n    <pre class=\"prompt-body\" data-rev=\"REV 05 / 2026.04.22\">01〜04の各ア
